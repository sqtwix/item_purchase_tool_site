<template>
    <div class="slds-theme_default slds-p-around_small" style="background: transparent;">
        
        <div class="slds-box slds-grid slds-grid_vertical-align-center slds-m-bottom_medium" style="background: white;">
            
            <div class="slds-col slds-size_1-of-5">
                <template if:true={isManager}>
                    <lightning-button label="Create Item" onclick={openNewItemModal}></lightning-button>
                </template>
            </div>
            
            <div class="slds-col slds-size_3-of-5">
                <lightning-record-view-form record-id={recordId} object-api-name="Account">
                    <div class="slds-grid slds-grid_align-center slds-gutters">
                        <div class="slds-col">
                            <lightning-output-field field-name="Name"></lightning-output-field>
                        </div>
                        <div class="slds-col">
                            <lightning-output-field field-name="AccountNumber"></lightning-output-field>
                        </div>
                        <div class="slds-col">
                            <lightning-output-field field-name="Industry"></lightning-output-field>
                        </div>
                    </div>
                </lightning-record-view-form>
            </div>
            
            <div class="slds-col slds-size_1-of-5 slds-text-align_right">
                <lightning-button label="Cart" icon-name="utility:cart" onclick={openCart} variant="brand"></lightning-button>
            </div>
        </div>

        <div class="slds-grid slds-gutters">
            
            <div class="slds-col slds-size_3-of-4">
                
                <div class="slds-box slds-m-bottom_medium slds-p-around_x-small" style="background: white;">
                    <lightning-input type="search" placeholder="SEARCH ITEMS..." onchange={handleSearch} variant="label-hidden"></lightning-input>
                </div>

                <div class="slds-grid slds-wrap slds-gutters">
                    <template for:each={items} for:item="item">
                        <div key={item.Id} class="slds-col slds-size_1-of-2 slds-p-bottom_medium">
                            <div class="slds-box slds-theme_default slds-text-align_center">
                                
                                <h3 class="slds-text-heading_small slds-m-bottom_small"><b>{item.Name}</b></h3>
                                
                                <p class="slds-text-body_small slds-m-bottom_x-small">{item.Description__c}</p>
                                
                                <img src={item.Image__c} alt={item.Name} style="height: 120px; width: 100%; object-fit: cover; border-radius: 4px; margin-bottom: 10px;" />
                                
                                <p class="slds-text-title_caps slds-text-color_success slds-m-bottom_small">
                                    <lightning-formatted-number value={item.Price__c} format-style="currency"></lightning-formatted-number> 
                                    | Stock: {item.AvailableQuantity__c}
                                </p>
                                
                                <div class="slds-grid slds-grid_align-spread">
                                    <lightning-button label="Details" data-id={item.Id} onclick={openDetailsModal}></lightning-button>
                                    <lightning-button label="Add" data-id={item.Id} variant="brand-outline" onclick={addToCart}></lightning-button>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div class="slds-col slds-size_1-of-4">
                <div class="slds-box" style="background: #f4f6f9; min-height: 100%;">
                    <h2 class="slds-text-heading_medium slds-m-bottom_medium"><b>FILTERS</b></h2>
                    
                    <div class="slds-m-bottom_medium">
                        <lightning-input label="Type" placeholder="Enter Type..." onchange={handleTypeChange}></lightning-input>
                        </div>

                    <div class="slds-m-bottom_large">
                        <lightning-input label="Family" placeholder="Enter Family..." onchange={handleFamilyChange}></lightning-input>
                    </div>

                    <div class="slds-text-title_caps slds-text-color_weak slds-m-top_large">
                        Total Items: {itemCount}
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <template if:true={showCartModal}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">Your Cart</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th>Item Name</th>
                                <th>Quantity</th>
                                <th>Unit Price</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={cart} for:item="cartItem">
                                <tr key={cartItem.itemId}>
                                    <td>{cartItem.name}</td>
                                    <td>{cartItem.quantity}</td>
                                    <td><lightning-formatted-number value={cartItem.unitPrice} format-style="currency"></lightning-formatted-number></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeCart} class="slds-m-right_small"></lightning-button>
                    <lightning-button label="Checkout" variant="brand" onclick={handleCheckout}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <template if:true={showDetailsModal}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">Item Details</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-record-view-form record-id={selectedItemId} object-api-name="Item__c">
                        <lightning-output-field field-name="Name"></lightning-output-field>
                        <lightning-output-field field-name="Description__c"></lightning-output-field>
                        <lightning-output-field field-name="Type__c"></lightning-output-field>
                        <lightning-output-field field-name="Family__c"></lightning-output-field>
                    </lightning-record-view-form>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Close" onclick={closeDetailsModal}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <template if:true={showNewItemModal}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">Create New Item</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-input label="Name" data-field="newItemName" onchange={handleInputChange}></lightning-input>
                    <lightning-input label="Description" data-field="newItemDesc" onchange={handleInputChange}></lightning-input>
                    <lightning-input label="Type" data-field="newItemType" onchange={handleInputChange}></lightning-input>
                    <lightning-input label="Family" data-field="newItemFamily" onchange={handleInputChange}></lightning-input>
                    <lightning-input type="number" label="Price" data-field="newItemPrice" onchange={handleInputChange}></lightning-input>
                    <lightning-input type="number" label="Quantity" data-field="newItemQty" onchange={handleInputChange}></lightning-input>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeNewItemModal} class="slds-m-right_small"></lightning-button>
                    <lightning-button label="Save" variant="brand" onclick={handleCreateItem}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
